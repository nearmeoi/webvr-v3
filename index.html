<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        name="viewport" />

    <!-- Web App Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Museum Makassar VR">
    <meta name="application-name" content="Museum Makassar VR">
    <meta name="theme-color" content="#221610">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
    <link rel="apple-touch-icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">

    <title>Museum Kota Makassar - Virtual Tour</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c1a88c",
                        "primary-dark": "#a3886b",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.6s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: 0 },
                            '100%': { opacity: 1 },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Public Sans', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .lite-glass {
            background-color: rgba(255, 255, 255, 0.92);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        .dark .lite-glass {
            background-color: rgba(34, 22, 16, 0.92);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        /* Landing screen — fixed, full viewport */
        #landing-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
            overflow: hidden;
        }

        /* Background image — CSS approach for guaranteed full coverage */
        .landing-hero-bg {
            position: absolute;
            inset: 0;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        /* Gradient overlay on top of bg */
        .landing-hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 0%, rgba(248, 246, 246, 0.4) 50%, rgba(248, 246, 246, 1) 100%);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">

    <!-- Landing Screen (fixed, full viewport) -->
    <div id="landing-screen">
        <!-- Full-screen BG via CSS -->
        <div class="landing-hero-bg"></div>

        <!-- Main Content Area -->
        <main class="relative flex flex-col items-center justify-center w-full h-full px-4 sm:px-6 py-6 text-center">

            <!-- Content Card -->
            <div class="lite-glass p-6 sm:p-8 md:p-10 rounded-3xl z-20 w-full max-w-[360px] sm:max-w-md border border-primary/10 animate-fade-in opacity-0"
                style="animation-delay: 0.1s;">
                <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold leading-tight mb-2 md:mb-3">
                    <span class="block text-xl sm:text-2xl font-medium text-slate-500 dark:text-slate-400 mb-1">Virtual
                        Tour</span>
                    <span class="text-primary-dark dark:text-primary tracking-tight">Museum Kota Makassar</span>
                </h1>
                <p class="text-slate-600 dark:text-slate-300 text-sm sm:text-base mb-6 md:mb-8 leading-relaxed">
                    Jelajahi sejarah dan budaya Makassar melalui pengalaman virtual 360° interaktif dan mendalam kami.
                </p>
                <div class="flex flex-col gap-3 w-full">
                    <button id="enter-vr-btn"
                        class="w-full bg-[#a3886b] hover:bg-[#8a7058] text-white font-bold py-4 px-6 rounded-2xl transition-colors duration-200 flex items-center justify-center gap-2 shadow-md">
                        <span class="tracking-wide">MULAI VR</span>
                        <span class="material-symbols-outlined text-xl">arrow_forward</span>
                    </button>
                    <button
                        class="w-full bg-transparent hover:bg-[#c1a88c]/10 text-[#a3886b] dark:text-[#c1a88c]/80 font-semibold py-3.5 px-6 rounded-2xl transition-colors duration-200 border-2 border-[#c1a88c]/20 hover:border-[#c1a88c]/40">
                        Panduan Aplikasi
                    </button>
                </div>
            </div>

            <!-- Copyright Footer -->
            <p class="z-20 mt-8 text-[11px] sm:text-xs text-slate-500 dark:text-slate-400 tracking-wider animate-fade-in opacity-0"
                style="animation-delay: 0.4s;">
                &copy; 2026 Tim Pengembang Program Virtual Tour<br>Politeknik Pariwisata Makassar
            </p>
        </main>
    </div>

    <!-- Script to run the actual 3D App -->
    <script type="module" src="/src/main.js"></script>
</body>

</html>
